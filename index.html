let st={
  key:"Caching with Redis",tab:"resource",
  checks:JSON.parse(localStorage.getItem(CHECKS_KEY)||'{}'),
  notes:JSON.parse(localStorage.getItem(NOTES_KEY)||'{}')
};
function saveChecks(){try{localStorage.setItem(CHECKS_KEY,JSON.stringify(st.checks))}catch(e){}}
function saveNotes(){try{localStorage.setItem(NOTES_KEY,JSON.stringify(st.notes))}catch(e){}}
function getChecks(k){return st.checks[k]||{}}
function getNote(k){return st.notes[k]||''}
function masteryScore(k){const c=getChecks(k);return CHECKLIST.filter((_,i)=>c[i]).length}
function totalDone(){return ALL.reduce((a,k)=>a+masteryScore(k),0)}

const SRC_COLOR={
  "Hello Interview":"#185FA5",
  "ByteByteGo":"#D85A30",
  "Anthropic":"#534AB7",
  "OWASP":"#3B6D11",
  "AWS Docs":"#854F0B",
  "Martin Kleppmann":"#534AB7",
  "Stripe Engineering":"#639922"
};

function srcColor(s){return SRC_COLOR[s]||"var(--color-text-tertiary)"}

function renderResource(key){
  const r=RES[key];if(!r)return'<div style="padding:20px;color:var(--color-text-secondary);font-size:13px">Resource data coming soon.</div>';
  const p=r.primary;
  return`<div class="res-card">
    <div class="res-source"><div class="res-source-dot" style="background:${srcColor(p.src)}"></div><span style="color:${srcColor(p.src)}">${p.src}</span></div>
    <div class="res-title">${p.label}</div>
    <div class="res-why">${p.why}</div>
    <a class="open-btn" href="${p.url}" target="_blank" rel="noopener"><i class="ti ti-external-link" aria-hidden="true"></i> Open resource</a>
  </div>
  <div class="also-label">Also worth reading</div>
  <div class="also-links">${r.also.map(a=>`<a class="also-link" href="${a.url}" target="_blank" rel="noopener">
    <i class="ti ti-arrow-right" aria-hidden="true"></i>
    <span>${a.label}</span>
    <span class="also-link-src" style="color:${srcColor(a.src)}">${a.src}</span>
  </a>`).join('')}</div>`;
}

function renderChecklist(key){
  const checks=getChecks(key);const score=masteryScore(key);
  return`<div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-tertiary);margin-bottom:10px">Mastery — ${score}/${CHECKLIST.length}</div>
  <div class="pb-wrap" style="margin-bottom:14px"><div class="pb-fill" style="width:${(score/CHECKLIST.length)*100}%"></div></div>
  <div>${CHECKLIST.map((item,i)=>`<div class="cl-item${checks[i]?' checked':''}" onclick="toggleCheck('${key}',${i})"><div class="cb">${checks[i]?'✓':''}</div><span>${item}</span></div>`).join('')}</div>
  ${score===CHECKLIST.length?`<div style="margin-top:14px;padding:10px 14px;background:#E1F5EE;border:.5px solid #5DCAA5;border-radius:var(--border-radius-md);font-size:13px;color:#085041;font-weight:500">✓ Mastered</div>`:''}`;
}

function renderPage(key){
  const r=RES[key];
  const checks=getChecks(key);
  const ph=r?r.phase:PHASES.find(p=>p.concepts.includes(key))?.label||'';
  const TABS=["resource","my notes","checklist"];
  const tabsHTML=TABS.map(t=>`<div class="tab${st.tab===t?' active':''}" onclick="setTab('${t}')">${t}</div>`).join('');
  let body='';
  if(st.tab==="resource") body=renderResource(key);
  else if(st.tab==="my notes") body=`<div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-tertiary);margin-bottom:8px">My notes</div><textarea class="notes-area" placeholder="Write your own notes after reading the resource…" oninput="updateNote('${key}',this.value)">${getNote(key)}</textarea>`;
  else if(st.tab==="checklist") body=renderChecklist(key);
  return`<div class="topbar">
    <div style="display:flex;align-items:baseline;gap:8px"><span class="t-ph">${ph}</span><span class="t-title">${key}</span></div>
    <div style="display:flex;align-items:center;gap:5px">
      <div style="width:5px;height:5px;border-radius:50%;background:${masteryScore(key)===CHECKLIST.length?'#1D9E75':masteryScore(key)>0?'#378ADD':'var(--color-border-secondary)'}"></div>
      <span style="font-size:11px;color:var(--color-text-tertiary)">${masteryScore(key)}/${CHECKLIST.length}</span>
    </div>
  </div>
  <div class="tabs">${tabsHTML}</div>
  <div class="content">${body}</div>`;
}

function renderDash(){
  const total=ALL.length*CHECKLIST.length;const done=totalDone();const pct=Math.round((done/total)*100);
  const mastered=ALL.filter(k=>masteryScore(k)===CHECKLIST.length).length;
  const sources=[...new Set(Object.values(RES).map(r=>r.primary.src))];
  return`<div class="topbar"><span class="t-title" style="font-size:16px">Dashboard</span></div>
  <div class="content">
  <div style="display:flex;gap:10px;margin-bottom:16px">
  <div class="stat-card"><div class="stat-lbl">Progress</div><div class="stat-val">${done}<span style="font-size:12px;font-weight:400;color:var(--color-text-tertiary)"> / ${total}</span></div></div>
  <div class="stat-card"><div class="stat-lbl">Mastered</div><div class="stat-val" style="color:#1D9E75">${mastered}</div></div>
  <div class="stat-card"><div class="stat-lbl">Readiness</div><div class="stat-val">${pct}%</div></div>
  </div>
  <div class="pb-wrap" style="margin-bottom:20px"><div class="pb-fill" style="width:${pct}%"></div></div>
  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-tertiary);margin-bottom:10px">Source legend</div>
  <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px">${sources.map(s=>`<div style="font-size:11px;padding:3px 10px;border-radius:20px;background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);color:${srcColor(s)};font-weight:500">${s}</div>`).join('')}</div>
  <div style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-tertiary);margin-bottom:10px">All concepts</div>
  ${ALL.map(k=>{const s=masteryScore(k);const r=RES[k];return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;cursor:pointer" onclick="selectConcept('${k}')">
  <div style="font-size:12px;min-width:148px;color:var(--color-text-primary)">${k}</div>
  ${r?`<div style="font-size:10px;padding:1px 7px;border-radius:20px;background:var(--color-background-secondary);color:${srcColor(r.primary.src)};border:.5px solid var(--color-border-tertiary)">${r.primary.src}</div>`:''}
  <div class="pb-wrap" style="flex:1"><div class="pb-fill" style="width:${(s/CHECKLIST.length)*100}%;background:${s===CHECKLIST.length?'#1D9E75':'#378ADD'}"></div></div>
  <div style="font-size:11px;color:var(--color-text-tertiary);min-width:28px;text-align:right">${s}/${CHECKLIST.length}</div>
  </div>`;}).join('')}
  </div>`;
}

function render(){
  const app=document.getElementById('app');
  const sbHTML=`<div class="sidebar">
  <div class="sb-header"><div class="sb-title">SysDesign Lab</div></div>
  <div class="sb-section"><div class="ph-item${st.key==='__dash__'?' active':''}" onclick="selectConcept('__dash__')"><div class="dot dot-active"></div>Dashboard</div></div>
  ${PHASES.map(ph=>`<div class="sb-section"><div class="ph-label">${ph.label} · ${ph.name}</div>${ph.concepts.map(c=>{const isA=st.key===c;const s=masteryScore(c);const dc=s===CHECKLIST.length?'dot-done':isA?'dot-active':'dot-locked';return`<div class="ph-item${isA?' active':''}" onclick="selectConcept('${c}')"><div class="dot ${dc}"></div><span style="font-size:11px">${c}</span></div>`;}).join('')}</div>`).join('')}
  </div>`;
  const mainHTML=st.key==='__dash__'?renderDash():renderPage(st.key);
  app.innerHTML=sbHTML+`<div class="main">${mainHTML}</div>`;
}

function selectConcept(k){st.key=k;st.tab="resource";render()}
function setTab(t){st.tab=t;render()}
function toggleCheck(k,i){if(!st.checks[k])st.checks[k]={};st.checks[k][i]=!st.checks[k][i];saveChecks();render()}
function updateNote(k,v){st.notes[k]=v;saveNotes()}

render();
</script>
